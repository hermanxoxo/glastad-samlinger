name: Sync & Deploy — Glastad Samlinger

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Kjør automatisk hver time (kan deaktiveres ved å fjerne disse linjene)
    - cron: '0 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync data from Airtable
        run: npm run sync
        env:
          AIRTABLE_TOKEN:     ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID:   ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID:  ${{ secrets.AIRTABLE_TABLE_ID }}
          AIRTABLE_VIEW_NAME: ${{ secrets.AIRTABLE_VIEW_NAME }}

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
